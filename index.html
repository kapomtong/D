<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL SPAMMER ☠️</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .dark-bg { background: linear-gradient(135deg, #0f0c20 0%, #06040a 100%); }
        .neon-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .neon-text { text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="dark-bg min-h-screen flex items-center justify-center p-4 text-gray-200">

    <div class="bg-black/60 backdrop-blur-xl rounded-2xl border border-red-500/30 p-6 w-full max-w-md transition-all neon-glow">
        
        <div class="text-center mb-6">
            <h1 class="cyber-font text-3xl font-black text-red-500 tracking-wider neon-text uppercase">
                // NGL 3007X
            </h1>
            <p class="text-[10px] text-gray-500 tracking-widest mt-1 uppercase font-mono">Anonymous Message Dispatcher</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 font-mono">
                    > USERNAME <span class="text-[10px] text-red-400/70">(AUTO)</span>
                </label>
                <input type="text" id="username" placeholder="enter username..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 placeholder-zinc-700 focus:outline-none focus:border-red-500 font-mono transition-colors">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider font-mono">> MESSAGE</label>
                    <button onclick="randomMessage()" class="text-[11px] bg-red-950/50 text-red-400 border border-red-900/50 px-2 py-0.5 rounded hover:bg-red-900/40 transition-colors font-mono cursor-pointer">
                        [🎲 RANDOM]
                    </button>
                </div>
                <textarea id="message" rows="3" placeholder="type your dark secrets here..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-gray-300 placeholder-zinc-700 focus:outline-none focus:border-red-500 resize-none transition-colors"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3 font-mono">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> COUNT</label>
                    <input type="number" id="count" value="10" min="1" 
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> DELAY (SEC)</label>
                    <input type="number" id="delay" value="0.5" min="0" step="0.1"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500">
                </div>
            </div>

            <div class="pt-2">
                <button id="startBtn" onclick="startSending()" 
                    class="w-full bg-gradient-to-r from-red-600 to-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg hover:from-red-500 hover:to-red-700 active:scale-[0.99] transition-all cursor-pointer text-md font-mono tracking-wider uppercase">
                    ⚡ RUN 
                </button>
                <button id="stopBtn" onclick="stopSending()" 
                    class="hidden w-full bg-zinc-900 text-red-500 border border-red-500/50 font-bold py-3.5 rounded-xl shadow-lg hover:bg-zinc-800 active:scale-[0.99] transition-all cursor-pointer text-md font-mono tracking-wider uppercase">
                    🛑 PROCESS
                </button>
            </div>
        </div>

        <div id="statusSection" class="hidden mt-6 pt-5 border-t border-zinc-900 space-y-3 font-mono">
            <div class="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-900">
                <span class="text-xs text-gray-400 uppercase tracking-wider">STATUS:</span>
                <span id="progressText" class="text-sm font-bold text-red-500">0 / 0</span>
            </div>
            
            <div id="runningAnimation" class="hidden text-center text-xs text-red-400/80 py-1 animate-pulse">
                ⚡ <span class="tracking-widest">INJECTING...</span>
            </div>

            <div id="logBox" class="bg-black rounded-xl p-3 text-[11px] max-h-28 overflow-y-auto text-zinc-500 space-y-1 border border-zinc-900">
            </div>
        </div>

    </div>

    <script>
        let isRunning = false;
        let shouldStop = false;

        const darkMessages = [
            "ฮั่นแน่ แอบมองเราอยู่ใช่ป่ะ รู้นะ 👁️‍🗨️",
            "ความลับที่แกซ่อนไว้... เรารู้นะหึๆ 🤫",
            "คิดว่าหลบพ้นหรอ ยินดีต้อนรับสู่ความจริง 💀",
            "ถ้าว่างนักก็มาคุยกันตรงๆ ดีกว่ามานั่งเหงาใน NGL ⚡",
            "เจ้าชายไอที",
            "System Overload: ดาเมจความเท่ทะลุจอแล้วคุณน่ะ",
            "อย่าเพิ่งนอน สิมาคุยกันก่อนนนน เก่งนักก็ทักมาดิ 😉"
        ];

        window.onload = function() {
            const savedUser = localStorage.getItem('ngl_saved_username');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
            }
        };

        function randomMessage() {
            const randomIndex = Math.floor(Math.random() * darkMessages.length);
            document.getElementById('message').value = darkMessages[randomIndex];
        }

        function generateDeviceId() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            const makePart = (len) => Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            return `${makePart(8)}-${makePart(4)}-${makePart(4)}-${makePart(4)}-${makePart(12)}`;
        }

        async function startSending() {
            const username = document.getElementById('username').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const delay = parseFloat(document.getElementById('delay').value) * 1000;

            if (!username || !message) {
                alert('ยังมีช่องว่าง');
                return;
            }

            localStorage.setItem('ngl_saved_username', username);

            isRunning = true;
            shouldStop = false;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('statusSection').classList.remove('hidden');
            document.getElementById('runningAnimation').classList.remove('hidden');
            
            const logBox = document.getElementById('logBox');
            logBox.innerHTML = ''; 

            let successCount = 0;

            // แก้ไขตรงนี้: เปลี่ยนไปยิงเข้าหา Vercel Proxy ภายในเซิร์ฟเวอร์เพื่อไม่ให้ติดปัญหา 403 และ CORS
            const endpointGateway = '/api/submit';

            for (let i = 0; i < count; i++) {
                if (shouldStop) {
                    addLog('⚠️ PROCESS_TERMINATED_BY_USER');
                    break;
                }

                document.getElementById('progressText').innerText = `${i + 1} / ${count}`;

                try {
                    const response = await fetch(endpointGateway, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: new URLSearchParams({
                            'username': username,
                            'question': message,
                            'deviceId': generateDeviceId(),
                            'gameSlug': '',
                            'referrer': ''
                        })
                    });

                    if (response.ok) {
                        successCount++;
                        addLog(`SUCCESS // PACKET_[${successCount}]_INJECTED`);
                    } else {
                        addLog(`FAILED // HTTP_ERROR_[${response.status}]`);
                    }
                } catch (error) {
                    addLog(`ROUTING_ALERT // REDIRECT_IN_PROGRESS`);
                }

                await new Promise(resolve => setTimeout(resolve, delay));
            }

            resetUI();
        }

        function stopSending() {
            shouldStop = true;
        }

        function resetUI() {
            isRunning = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('runningAnimation').classList.add('hidden');
        }

        function addLog(text) {
            const logBox = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div class="text-red-400/70">[${time}] ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL 3007X ☠️</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .dark-bg { background: linear-gradient(135deg, #0f0c20 0%, #06040a 100%); }
        .neon-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .neon-text { text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="dark-bg min-h-screen flex flex-col items-center justify-center p-4 text-gray-200">

    <div class="bg-black/60 backdrop-blur-xl rounded-2xl border border-red-500/30 p-6 w-full max-w-md transition-all neon-glow">
        
        <div class="text-center mb-6">
            <h1 class="cyber-font text-3xl font-black text-red-500 tracking-wider neon-text uppercase">
                 NGL 3007X
            </h1>
            <p class="text-[10px] text-gray-500 tracking-widest mt-1 uppercase font-mono">Anonymous Message Dispatcher</p>
        </div>

        <div class="space-y-4">
            <!-- สวิตช์สลับโหมดความเร็ว -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 font-mono">> FIRE MODE</label>
                <div class="grid grid-cols-2 gap-2 bg-zinc-950 p-1.5 rounded-xl border border-zinc-900 font-mono text-xs">
                    <button id="modeNormalBtn" onclick="switchSpeedMode('normal')" class="py-2 rounded-lg text-center font-bold bg-red-600 text-white cursor-pointer transition-all">🐢 โหมดช้า</button>
                    <button id="modeCyberBtn" onclick="switchSpeedMode('cyber')" class="py-2 rounded-lg text-center font-bold text-zinc-500 hover:text-gray-300 cursor-pointer transition-all">⚡ โหมดโครตเร็ว</button>
                </div>
            </div>

            <!-- ช่องใส่ Access Key -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 font-mono">> ACCESS KEY</label>
                <input type="text" id="accessKey" placeholder="ใส่คีย์..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-yellow-400 placeholder-zinc-700 focus:outline-none focus:border-red-500 font-mono text-sm">
            </div>

            <!-- ช่องใส่ Username -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 font-mono">> USERNAME</label>
                <input type="text" id="username" placeholder="ใส่ชื่อ..." oninput="checkSecretMenu(this.value)"
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 placeholder-zinc-700 focus:outline-none focus:border-red-500 font-mono text-sm">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider font-mono">> MESSAGE</label>
                    <button onclick="randomMessage()" class="text-[11px] bg-red-950/50 text-red-400 border border-red-900/50 px-2 py-0.5 rounded hover:bg-red-900/40 transition-colors font-mono cursor-pointer">[🎲 RANDOM]</button>
                </div>
                <textarea id="message" rows="2" placeholder="ใส่ข้อความ..." class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-gray-300 placeholder-zinc-700 focus:outline-none focus:border-red-500 resize-none text-sm"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3 font-mono text-xs">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> COUNT</label>
                    <input type="number" id="count" value="10" min="1" class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500 font-bold">
                </div>
                <div id="delayInputZone">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> DELAY (SEC)</label>
                    <input type="number" id="delay" value="2.0" min="0.1" step="0.1" class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500 font-bold">
                </div>
            </div>

            <div class="pt-2">
                <button id="startBtn" onclick="startSending()" class="w-full bg-gradient-to-r from-red-600 to-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg hover:from-red-500 hover:to-red-700 active:scale-[0.99] transition-all cursor-pointer font-mono tracking-wider text-sm uppercase">⚡ RUN</button>
                <button id="stopBtn" onclick="stopSending()" class="hidden w-full bg-zinc-900 text-red-500 border border-red-500/50 font-bold py-3.5 rounded-xl shadow-lg hover:bg-zinc-800 active:scale-[0.99] transition-all cursor-pointer font-mono tracking-wider text-sm uppercase">🛑 PROCESS STOP</button>
            </div>
        </div>

        <div id="statusSection" class="hidden mt-5 pt-4 border-t border-zinc-900 space-y-3 font-mono">
            <div class="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-900">
                <span class="text-xs text-gray-400 uppercase tracking-wider">STATUS:</span>
                <span id="progressText" class="text-xs font-bold text-red-500">0 / 0</span>
            </div>
            <div id="runningAnimation" class="hidden text-center text-[11px] text-red-400/80 py-0.5 animate-pulse">⚡ INJECTING PACKETS...</div>
            <div id="logBox" class="bg-black rounded-xl p-3 text-[10px] max-h-24 overflow-y-auto text-zinc-500 space-y-1 border border-zinc-900"></div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 🔑 [แผงควบคุมแอดมินระดับสูง] ปลดล็อกเมื่อพิมพ์ mnn -->
    <!-- ========================================== -->
    <div id="developerPanel" class="hidden mt-4 bg-zinc-950 border border-yellow-600/30 rounded-2xl p-5 w-full max-w-md font-mono shadow-xl text-xs">
        <h2 class="text-yellow-500 font-bold text-sm mb-4 border-b border-zinc-900 pb-2">🔥 CYBER COMMAND GATES (mnn)</h2>
        
        <div class="space-y-4">
            <!-- ส่วนที่ 1: จัดการคีย์ลิขสิทธิ์ + ปุ่มเปิดปิดสิทธิ์โหมดเร็ว -->
            <div class="bg-black/40 p-3 rounded-xl border border-zinc-900">
                <span class="text-yellow-500 font-bold block mb-2">// LICENSE KEYS MANAGER</span>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="targetKeyInput" placeholder="ชื่อคีย์..." class="w-full px-3 py-2 bg-black border border-zinc-800 rounded-lg text-yellow-400 focus:outline-none">
                    <button onclick="manageSystem('admin_add_key')" class="bg-emerald-950 border border-emerald-800 text-emerald-400 px-3 py-2 rounded-lg hover:bg-emerald-900">➕ สร้างคีย์</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button onclick="manageSystem('admin_toggle_speed')" class="bg-amber-950 border border-amber-800 text-amber-400 py-2 rounded-lg hover:bg-amber-900 font-bold">⚡ สลับสิทธิ์โหมดเร็ว</button>
                    <button onclick="manageSystem('admin_reset_key')" class="bg-blue-950 border border-blue-800 text-blue-400 py-2 rounded-lg hover:bg-blue-900">🔄 รีเซ็ตล็อกเครื่อง</button>
                </div>
                <button onclick="manageSystem('admin_delete_key')" class="w-full bg-red-950 border border-red-800 text-red-400 py-1.5 rounded-lg hover:bg-red-900">❌ ลบคีย์ถาวร</button>
            </div>

            <!-- ส่วนที่ 2: ระบบจัดการ Blacklist บล็อกชื่อคน -->
            <div class="bg-black/40 p-3 rounded-xl border border-zinc-900">
                <span class="text-red-500 font-bold block mb-2">// USERNAME BLACKLIST PANEL</span>
                <div class="flex gap-2">
                    <input type="text" id="targetUserInput" placeholder="พิมพ์ชื่อที่จะแบน..." class="w-full px-3 py-2 bg-black border border-zinc-800 rounded-lg text-red-400 focus:outline-none">
                    <button onclick="manageSystem('admin_add_blacklist')" class="bg-red-950 border border-red-900 text-red-400 px-3 py-2 rounded-lg hover:bg-red-900 font-bold">🚫 แบนชื่อ</button>
                    <button onclick="manageSystem('admin_remove_blacklist')" class="bg-zinc-900 border border-zinc-800 text-gray-400 px-2 py-2 rounded-lg hover:bg-zinc-800">🔓 ปลด</button>
                </div>
            </div>

            <!-- ส่วนที่ 3: ดึงดูฐานข้อมูลทั้งหมด -->
            <div>
                <button onclick="loadDatabaseData()" class="w-full bg-zinc-900 border border-zinc-800 py-2 rounded-lg text-gray-300 font-bold hover:bg-zinc-800 mb-2">📋 ดึงข้อมูลจากคลาวด์ Firebase ทั้งหมด</button>
                <div id="dbContainer" class="bg-black rounded-lg p-3 max-h-40 overflow-y-auto text-[10px] text-zinc-400 space-y-3 border border-zinc-900">
                    คลิกเพื่อโหลดสถานะ Real-time...
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let shouldStop = false;
        let speedMode = 'normal';

        const darkMessages = [
            "ฮั่นแน่ แอบมองเราอยู่ใช่ป่ะ รู้นะ 👁️‍玩", "ความลับที่แกซ่อนไว้... เรารู้นะหึๆ 🤫",
            "คิดว่าหลบพ้นหรอ ยินดีต้อนรับสู่ความจริง 💀", "เจ้าชายไอที", "อย่าเพิ่งนอน สิมาคุยกันก่อนนนน 😉"
        ];

        window.onload = function() {
            const savedUser = localStorage.getItem('ngl_saved_username');
            if (savedUser) document.getElementById('username').value = savedUser;
            const savedKey = localStorage.getItem('ngl_saved_key');
            if (savedKey) document.getElementById('accessKey').value = savedKey;
            if(savedUser === 'mnn') checkSecretMenu('mnn');
        };

        function switchSpeedMode(mode) {
            speedMode = mode;
            const normalBtn = document.getElementById('modeNormalBtn');
            const cyberBtn = document.getElementById('modeCyberBtn');
            const delayZone = document.getElementById('delayInputZone');

            if (mode === 'cyber') {
                cyberBtn.className = "py-2 rounded-lg text-center font-black bg-gradient-to-r from-amber-500 to-red-600 text-white cursor-pointer shadow-lg animate-pulse";
                normalBtn.className = "py-2 rounded-lg text-center font-bold text-zinc-500 hover:text-gray-300 cursor-pointer";
                delayZone.style.opacity = "0.3";
            } else {
                normalBtn.className = "py-2 rounded-lg text-center font-black bg-red-600 text-white cursor-pointer shadow-lg";
                cyberBtn.className = "py-2 rounded-lg text-center font-bold text-zinc-500 hover:text-gray-300 cursor-pointer";
                delayZone.style.opacity = "1";
            }
        }

        function randomMessage() {
            document.getElementById('message').value = darkMessages[Math.floor(Math.random() * darkMessages.length)];
        }

        function getOrGenerateDeviceId() {
            let id = localStorage.getItem('ngl_machine_id');
            if (!id) {
                id = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('ngl_machine_id', id);
            }
            return id;
        }

        function checkSecretMenu(val) {
            const panel = document.getElementById('developerPanel');
            if (val.trim() === 'mnn') {
                panel.classList.remove('hidden');
                loadDatabaseData();
            } else { panel.classList.add('hidden'); }
        }

        async function manageSystem(actionType) {
            const targetKey = document.getElementById('targetKeyInput').value.trim();
            const targetUser = document.getElementById('targetUserInput').value.trim();
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionType, targetKey: targetKey, targetUser: targetUser })
                });
                const result = await response.json();
                if(response.ok) {
                    alert(result.message);
                    loadDatabaseData();
                } else { alert(result.error); }
            } catch (err) { alert('เชื่อมต่อล้มเหลว'); }
        }

        async function loadDatabaseData() {
            const container = document.getElementById('dbContainer');
            container.innerHTML = 'กำลังดึงฐานข้อมูลสหพันธ์...';
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'admin_get_keys' })
                });
                const result = await response.json();
                if (result.success) {
                    let htmlContent = `<div class="mb-2 text-yellow-500 font-bold border-b border-zinc-900 pb-1">🔑 รายชื่อคีย์ในระบบ:</div>`;
                    const keyEntries = Object.entries(result.keys || {});
                    if(keyEntries.length === 0) htmlContent += `<div class="text-zinc-600">ไม่มีคีย์ปกติในคลาวด์</div>`;
                    keyEntries.forEach(([k, val]) => {
                        const status = (val.usedBy && val.usedBy !== "none") ? `🔒 ล็อกเครื่อง: ${val.usedBy.substring(0,6)}...` : '🟢 ว่าง';
                        const speedStatus = val.isSpeedAllowed ? `<span class="text-amber-400 font-bold">[⚡โหมดเร็ว:เปิด]</span>` : `<span class="text-zinc-600">[โหมดธรรมดา]</span>`;
                        htmlContent += `<div class="py-0.5">- <span class="text-yellow-400 font-mono">${k}</span> ${speedStatus} (${status})</div>`;
                    });

                    htmlContent += `<div class="mt-3 mb-2 text-red-500 font-bold border-b border-zinc-900 pb-1">🚫 บัญชีที่ติด Blacklist (ห้ามยิง):</div>`;
                    const bannedUsers = Object.keys(result.blacklist || {});
                    if(bannedUsers.length === 0) htmlContent += `<div class="text-zinc-600">ไม่มีชื่อที่ถูกแบน</div>`;
                    bannedUsers.forEach(u => {
                        htmlContent += `<div class="text-red-400 font-bold">- ${u}</div>`;
                    });

                    container.innerHTML = htmlContent;
                }
            } catch (err) { container.innerHTML = 'ดึงข้อมูลคลาวด์ล้มเหลว'; }
        }

        async function startSending() {
            const key = document.getElementById('accessKey').value.trim();
            const username = document.getElementById('username').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const delayVal = parseFloat(document.getElementById('delay').value) * 1000;

            if (!key || !username || !message) { alert('กรอกข้อมูลให้ครบถ้วนก่อนรัน'); return; }

            localStorage.setItem('ngl_saved_username', username);
            localStorage.setItem('ngl_saved_key', key);

            isRunning = true; shouldStop = false;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('statusSection').classList.remove('hidden');
            document.getElementById('runningAnimation').classList.remove('hidden');
            document.getElementById('logBox').innerHTML = ''; 

            let successCount = 0; let currentIndex = 0;
            const myMachineId = getOrGenerateDeviceId();

            const CONCURRENCY_LIMIT = speedMode === 'cyber' ? 5 : 1;

            async function sendWorker() {
                while (currentIndex < count && !shouldStop) {
                    const taskIndex = currentIndex++;
                    document.getElementById('progressText').innerText = `${taskIndex + 1} / ${count}`;

                    try {
                        const response = await fetch('/api/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                'key': key, 
                                'username': username, 
                                'question': message, 
                                'deviceId': myMachineId,
                                'requestedMode': speedMode // แนบโหมดความเร็วไปให้หลังบ้านตรวจสอบ
                            })
                        });
                        const result = await response.json();

                        if (response.ok) {
                            successCount++;
                            addLog(`⚡ SPAM SUCCESS${successCount}]`);
                        } else {
                            addLog(`❌ FAILED // ${result.error || 'SERVER_ERROR'}`);
                            // ถ้าโดนแบนสิทธิ์โหมดเร็ว หรือ คีย์ผิด/โดนบล็อก ให้ตัดการทำงานระบบทั้งหมดทันที
                            if(response.status === 403) { shouldStop = true; break; } 
                        }
                    } catch (error) { addLog(`⚠️ ERROR // SERVER_TIMEOUT`); }

                    if (CONCURRENCY_LIMIT === 1 && delayVal > 0) {
                        await new Promise(r => setTimeout(r, delayVal));
                    }
                }
            }

            const workers = [];
            for (let i = 0; i < CONCURRENCY_LIMIT; i++) { workers.push(sendWorker()); }
            await Promise.all(workers);
            resetUI();
        }

        function stopSending() { shouldStop = true; }
        function resetUI() {
            isRunning = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('runningAnimation').classList.add('hidden');
        }
        function addLog(text) {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<div class="font-mono text-[9px]">[${new Date().toLocaleTimeString()}] ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>

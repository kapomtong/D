<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL SPAMMER ☠️</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .dark-bg { background: linear-gradient(135deg, #0f0c20 0%, #06040a 100%); }
        .neon-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .neon-text { text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="dark-bg min-h-screen flex flex-col items-center justify-center p-4 text-gray-200">

    <div class="bg-black/60 backdrop-blur-xl rounded-2xl border border-red-500/30 p-6 w-full max-w-md transition-all neon-glow">
        
        <div class="text-center mb-6">
            <h1 class="cyber-font text-3xl font-black text-red-500 tracking-wider neon-text uppercase">
                // NGL 3007X
            </h1>
            <p class="text-[10px] text-gray-500 tracking-widest mt-1 uppercase font-mono">Anonymous Message Dispatcher</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 font-mono">
                    > ACCESS KEY <span class="text-[10px] text-red-400/70">(LICENSE_LOCKED)</span>
                </label>
                <input type="text" id="accessKey" placeholder="enter your access key..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-yellow-400 placeholder-zinc-700 focus:outline-none focus:border-red-500 font-mono transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 font-mono">
                    > USERNAME <span class="text-[10px] text-red-400/70">(AUTO)</span>
                </label>
                <input type="text" id="username" placeholder="enter username..." oninput="checkSecretMenu(this.value)"
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 placeholder-zinc-700 focus:outline-none focus:border-red-500 font-mono transition-colors">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider font-mono">> MESSAGE</label>
                    <button onclick="randomMessage()" class="text-[11px] bg-red-950/50 text-red-400 border border-red-900/50 px-2 py-0.5 rounded hover:bg-red-900/40 transition-colors font-mono cursor-pointer">
                        [🎲 RANDOM]
                    </button>
                </div>
                <textarea id="message" rows="3" placeholder="type your dark secrets here..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-800 bg-zinc-950/80 text-gray-300 placeholder-zinc-700 focus:outline-none focus:border-red-500 resize-none transition-colors"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3 font-mono">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> COUNT</label>
                    <input type="number" id="count" value="10" min="1" 
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">> DELAY (SEC)</label>
                    <input type="number" id="delay" value="2.0" min="0.1" step="0.1"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-800 bg-zinc-950/80 text-red-400 text-center focus:outline-none focus:border-red-500">
                </div>
            </div>

            <div class="pt-2">
                <button id="startBtn" onclick="startSending()" 
                    class="w-full bg-gradient-to-r from-red-600 to-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg hover:from-red-500 hover:to-red-700 active:scale-[0.99] transition-all cursor-pointer text-md font-mono tracking-wider uppercase">
                    ⚡ RUN 
                </button>
                <button id="stopBtn" onclick="stopSending()" 
                    class="hidden w-full bg-zinc-900 text-red-500 border border-red-500/50 font-bold py-3.5 rounded-xl shadow-lg hover:bg-zinc-800 active:scale-[0.99] transition-all cursor-pointer text-md font-mono tracking-wider uppercase">
                    🛑 PROCESS
                </button>
            </div>
        </div>

        <div id="statusSection" class="hidden mt-6 pt-5 border-t border-zinc-900 space-y-3 font-mono">
            <div class="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-900">
                <span class="text-xs text-gray-400 uppercase tracking-wider">STATUS:</span>
                <span id="progressText" class="text-sm font-bold text-red-500">0 / 0</span>
            </div>
            
            <div id="runningAnimation" class="hidden text-center text-xs text-red-400/80 py-1 animate-pulse">
                ⚡ <span class="tracking-widest">INJECTING...</span>
            </div>

            <div id="logBox" class="bg-black rounded-xl p-3 text-[11px] max-h-28 overflow-y-auto text-zinc-500 space-y-1 border border-zinc-900">
            </div>
        </div>
    </div>

    <div id="developerPanel" class="hidden mt-4 bg-zinc-950 border border-yellow-600/30 rounded-2xl p-6 w-full max-w-md font-mono shadow-xl">
        <h2 class="text-yellow-500 font-bold text-sm mb-4 border-b border-zinc-900 pb-2">🔥 FIREBASE CLOUD HUB (mnn)</h2>
        
        <div class="space-y-4 text-xs">
            <div>
                <label class="block text-gray-400 mb-1">พิมพ์ระบุชื่อคีย์ที่ต้องการจัดการ:</label>
                <div class="flex gap-2">
                    <input type="text" id="targetKeyInput" placeholder="พิมพ์ชื่อคีย์ตรงนี้..." class="w-full px-3 py-2 bg-black border border-zinc-800 rounded-lg text-yellow-400 focus:outline-none">
                    <button onclick="manageKey('admin_add_key')" class="bg-emerald-950 border border-emerald-800 text-emerald-400 px-4 py-2 rounded-lg hover:bg-emerald-900">➕ สร้าง</button>
                </div>
            </div>

            <div class="flex gap-2 pt-1">
                <button onclick="manageKey('admin_reset_key')" class="w-1/2 bg-blue-950 border border-blue-800 text-blue-400 py-2 rounded-lg hover:bg-blue-900">🔄 รีเซ็ตล็อกเครื่อง</button>
                <button onclick="manageKey('admin_delete_key')" class="w-1/2 bg-red-950 border border-red-800 text-red-400 py-2 rounded-lg hover:bg-red-900">❌ ลบคีย์ทิ้ง</button>
            </div>

            <div class="pt-2 border-t border-zinc-900">
                <button onclick="loadAllKeys()" class="w-full bg-zinc-900 border border-zinc-800 py-2 rounded-lg text-gray-300 hover:bg-zinc-800 mb-2">📋 ดึงข้อมูลคีย์จากฐานข้อมูล Firebase</button>
                <div id="keyListContainer" class="bg-black rounded-lg p-3 max-h-40 overflow-y-auto text-[10px] text-zinc-400 space-y-1">
                    กรุณากดดึงข้อมูลระบบ...
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let shouldStop = false;

        const darkMessages = [
            "ฮั่นแน่ แอบมองเราอยู่ใช่ป่ะ รู้นะ 👁️‍🗨️",
            "ความลับที่แกซ่อนไว้... เรารู้นะหึๆ 🤫",
            "คิดว่าหลบพ้นหรอ ยินดีต้อนรับสู่ความจริง 💀",
            "ถ้าว่างนักก็มาคุยกันตรงๆ ดีกว่ามานั่งเหงาใน NGL ⚡",
            "เจ้าชายไอที",
            "System Overload: ดาเมจความเท่ทะลุจอแล้วคุณน่ะ",
            "อย่าเพิ่งนอน สิมาคุยกันก่อนนนน เก่งนักก็ทักมาดิ 😉"
        ];

        window.onload = function() {
            const savedUser = localStorage.getItem('ngl_saved_username');
            if (savedUser) document.getElementById('username').value = savedUser;

            const savedKey = localStorage.getItem('ngl_saved_key');
            if (savedKey) document.getElementById('accessKey').value = savedKey;

            if(savedUser === 'mnn') checkSecretMenu('mnn');
        };

        function randomMessage() {
            const randomIndex = Math.floor(Math.random() * darkMessages.length);
            document.getElementById('message').value = darkMessages[randomIndex];
        }

        function getOrGenerateDeviceId() {
            let id = localStorage.getItem('ngl_machine_id');
            if (!id) {
                const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
                const makePart = (len) => Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
                id = `${makePart(8)}-${makePart(4)}-${makePart(4)}-${makePart(4)}-${makePart(12)}`;
                localStorage.setItem('ngl_machine_id', id);
            }
            return id;
        }

        function checkSecretMenu(val) {
            const panel = document.getElementById('developerPanel');
            if (val.trim() === 'mnn') {
                panel.classList.remove('hidden');
                loadAllKeys();
            } else {
                panel.classList.add('hidden');
            }
        }

        async function manageKey(actionType) {
            const targetKey = document.getElementById('targetKeyInput').value.trim();
            if(!targetKey) return alert('กรุณาระบุคีย์ก่อนทำการจัดการ');

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionType, targetKey: targetKey })
                });
                const result = await response.json();
                if(response.ok) {
                    alert(result.message);
                    loadAllKeys();
                } else {
                    alert(result.error);
                }
            } catch (err) {
                alert('การเชื่อมต่อกับเซิร์ฟเวอร์หลักล้มเหลว');
            }
        }

        async function loadAllKeys() {
            const container = document.getElementById('keyListContainer');
            container.innerHTML = 'กำลังคุยกับเซิร์ฟเวอร์ Firebase...';
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'admin_get_keys' })
                });
                const result = await response.json();
                if (result.success) {
                    container.innerHTML = '';
                    const entries = Object.entries(result.keys);
                    if(entries.length === 0) {
                        container.innerHTML = 'ไม่มีคีย์ใน Firebase (คีย์พิเศษ admin, mhon รันผ่านโค้ดอัตโนมัติ)';
                        return;
                    }
                    entries.forEach(([keyName, keyData]) => {
                        const isLocked = (keyData.usedBy && keyData.usedBy !== "none");
                        const deviceStatus = isLocked ? `🔒 ล็อกเครื่อง: ${keyData.usedBy.substring(0,8)}...` : '🟢 ว่าง (รอคนเปิดใช้งาน)';
                        container.innerHTML += `<div class="border-b border-zinc-900 pb-1 mb-1 text-zinc-300">
                            <strong>คีย์คลาวด์:</strong> <span class="text-yellow-400">${keyName}</span><br>
                            <strong>สถานะล็อก:</strong> <span class="text-[9px] text-gray-500">${deviceStatus}</span>
                        </div>`;
                    });
                }
            } catch (err) {
                container.innerHTML = 'ดึงคีย์ล้มเหลว ตรวจสอบ Rules ใน Firebase';
            }
        }

        async function startSending() {
            const key = document.getElementById('accessKey').value.trim();
            const username = document.getElementById('username').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const delay = parseFloat(document.getElementById('delay').value) * 1000;

            if (!key || !username || !message) {
                alert('กรอกข้อมูลให้ครบถ้วนก่อนรัน');
                return;
            }

            localStorage.setItem('ngl_saved_username', username);
            localStorage.setItem('ngl_saved_key', key);

            isRunning = true;
            shouldStop = false;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('statusSection').classList.remove('hidden');
            document.getElementById('runningAnimation').classList.remove('hidden');
            
            const logBox = document.getElementById('logBox');
            logBox.innerHTML = ''; 

            let successCount = 0;
            const myMachineId = getOrGenerateDeviceId();

            for (let i = 0; i < count; i++) {
                if (shouldStop) {
                    addLog('⚠️ PROCESS_TERMINATED_BY_USER');
                    break;
                }

                document.getElementById('progressText').innerText = `${i + 1} / ${count}`;

                try {
                    const response = await fetch('/api/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            'key': key,
                            'username': username,
                            'question': message,
                            'deviceId': myMachineId
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        successCount++;
                        addLog(`SUCCESS // PACKET_[${successCount}]_INJECTED`);
                    } else {
                        addLog(`FAILED // ${result.error || 'SERVER_ERROR'}`);
                        if(response.status === 403) break;
                    }
                } catch (error) {
                    addLog(`ROUTING_ALERT // INTERNET_DISCONNECTED`);
                }

                await new Promise(resolve => setTimeout(resolve, delay));
            }

            resetUI();
        }

        function stopSending() { shouldStop = true; }
        function resetUI() {
            isRunning = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('runningAnimation').classList.add('hidden');
        }
        function addLog(text) {
            const logBox = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div class="text-red-400/70">[${time}] ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
